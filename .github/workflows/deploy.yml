name: Deploya AzureAppServiceAPI till Azure

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Sätt upp .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Bygg projektet
        run: dotnet build --configuration Release

      - name: Publicera projektet
        run: dotnet publish AzureAppServiceAPI/AzureAppServiceAPI.csproj --configuration Release --output ./publish

      - name: Deploya till Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Alshakerchi-backend'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish